# Frontend e2e (Playwright against vite with the mocked Tauri bridge).
name: E2E

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx --prefix apps/desktop playwright install --with-deps chromium
      - name: Run e2e
        working-directory: apps/desktop
        run: pnpm e2e
