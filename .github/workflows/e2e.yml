# Frontend e2e (Playwright against vite with the mocked Tauri bridge).
name: E2E

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        # webkit runs the perf specs (playwright.config.ts webkit-perf): the
        # app ships on Tauri's WebKitGTK, and Chromium-only budgets can pass
        # while the real engine lags.
        run: pnpm exec playwright install --with-deps chromium webkit
      - name: Run e2e
        run: pnpm e2e
