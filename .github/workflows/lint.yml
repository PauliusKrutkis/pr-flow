# Ultracite (Biome) lint + format check. Expected to fail until the codebase
# is brought into compliance — see biome.jsonc and `pnpm check` locally.

name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ultracite:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Ultracite check
        run: pnpm check
